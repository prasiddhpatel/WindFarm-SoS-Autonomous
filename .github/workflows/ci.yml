name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend deps
        run: |
          cd sos_orchestrator
          pip install -r requirements.txt
      - name: Import smoke test
        run: |
          cd sos_orchestrator
          python -c "from api.main import app; from digital_twin.paris_rul import rul_days; print('backend ok')"

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build dashboard
        run: |
          cd ops_dashboard
          npm install
          npm run build
