name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:

  # ── Backend unit + integration ────────────────────────────────────────────
  backend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          pip install -r sos_orchestrator/requirements.txt \
            pytest httpx numpy scipy pillow
      - name: Run backend + MRTA + digital-twin tests
        # PYTHONPATH covers:
        #   sos_orchestrator  — api, mrta, digital_twin, db, config
        #   .                 — training/, simulation/ (needed by test_dataset, test_smoke_sim)
        #   ros2_ws/src/drone_perception — needed by test_ros_nodes
        run: |
          PYTHONPATH=sos_orchestrator:ros2_ws/src/drone_perception:. \
            pytest tests/ \
              --ignore=tests/test_e2e_orchestration.py \
              -v --tb=short
      - name: Integration validator (module-only)
        run: PYTHONPATH=sos_orchestrator python3 tests/integration_validation.py --no-live

  # ── Perception + model runner + dataset + sim config ─────────────────────
  perception-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install pytest numpy pillow
      - name: Run perception + dataset + sim-config tests
        # PYTHONPATH:
        #   ros2_ws/src/drone_perception — drone_perception package
        #   .                             — training/ and simulation/ at repo root
        run: |
          PYTHONPATH=ros2_ws/src/drone_perception:. \
            pytest tests/test_perception.py \
                   tests/test_model_runner.py \
                   tests/test_dataset.py \
                   tests/test_smoke_sim.py \
                   -v --tb=short

  # ── End-to-end orchestration smoke (needs both PYTHONPATHs) ─────────────
  e2e-orchestration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          pip install -r sos_orchestrator/requirements.txt \
            pytest httpx numpy pillow
      - name: E2E orchestration smoke test
        run: |
          PYTHONPATH=sos_orchestrator:ros2_ws/src/drone_perception \
            pytest tests/test_e2e_orchestration.py -v --tb=short

  # ── Dashboard build ───────────────────────────────────────────────────────
  dashboard-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd ops_dashboard && npm install && npm run build

  # ── ROS 2 ordered colcon build ────────────────────────────────────────────
  ros2-build-check:
    runs-on: ubuntu-latest
    container:
      image: ros:humble-ros-base
    steps:
      - uses: actions/checkout@v4

      - name: Install apt deps
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            build-essential \
            ros-humble-eigen3-cmake-module \
            ros-humble-pcl-conversions \
            ros-humble-rclcpp-action \
            ros-humble-tf2-eigen \
            ros-humble-cv-bridge \
            libpcl-dev \
            python3-colcon-common-extensions \
            python3-numpy \
            python3-scipy \
            python3-opencv \
            python3-pip

      - name: 1 — sos_interfaces
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          cd ros2_ws && colcon build --packages-select sos_interfaces --symlink-install

      - name: 2 — Python packages
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          source ros2_ws/install/setup.bash
          cd ros2_ws
          colcon build \
            --packages-select drone_perception ground_robot_dock nde_crawler \
            --symlink-install

      - name: 3 — C++ packages
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          source ros2_ws/install/setup.bash
          cd ros2_ws
          colcon build \
            --packages-select drone_control drone_coverage drone_estimation \
                               ground_robot_nav safety_monitor \
            --symlink-install

      - name: 4 — Bringup
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          source ros2_ws/install/setup.bash
          cd ros2_ws && colcon build --packages-select windfarm_bringup --symlink-install

      - name: 5 — Smoke checks
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          source ros2_ws/install/setup.bash
          python3 -c "
          from launch import LaunchDescription
          from launch_ros.actions import Node
          print('launch ok')
          "
          pip3 install pytest --quiet
          PYTHONPATH=ros2_ws/src/drone_perception:. \
            pytest tests/test_perception.py tests/test_model_runner.py -v --tb=short
