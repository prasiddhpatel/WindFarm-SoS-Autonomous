apiVersion: apps/v1
kind: Deployment
metadata:
  name: sos-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sos-api
  template:
    metadata:
      labels:
        app: sos-api
    spec:
      containers:
        - name: api
          image: ghcr.io/prasiddhpatel/windfarm-sos-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sos-secrets
                  key: database-url
            - name: TELEMETRY_URL
              valueFrom:
                secretKeyRef:
                  name: sos-secrets
                  key: telemetry-url
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: MQTT_HOST
              value: mqtt
            - name: MQTT_PORT
              value: "1883"
---
apiVersion: v1
kind: Service
metadata:
  name: sos-api
spec:
  selector:
    app: sos-api
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
